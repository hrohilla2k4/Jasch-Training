<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Visualization</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      body {
        background: linear-gradient(to right, #eef2f3, #d9e4f5);
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
      }

      .main-container {
        padding: 30px;
      }

      .header-section {
        background: linear-gradient(135deg, #0d6efd, #0047ab);
        color: white;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
        margin-bottom: 30px;
      }

      .header-section h1 {
        font-weight: bold;
        margin: 0;
      }

      .filter-card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .chart-card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 25px;
      }

      .chart-placeholder {
        height: 350px;
        border: 2px dashed #cfd8dc;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: #f8f9fa;
        color: #6c757d;
        font-size: 18px;
        font-weight: 500;
      }

      .form-select {
        height: 50px;
        border-radius: 10px;
      }

      .section-title {
        font-weight: 600;
        margin-bottom: 15px;
        color: #0d6efd;
      }
    </style>
  </head>
  <body>
    <div class="container main-container">
      <!-- Header -->
      <div class="header-section">
        <h1><i class="bi bi-bar-chart-line-fill"></i> Data Visualization</h1>
        <p class="mt-2 mb-0">
          Analyze Coil Performance with Charts & Histogram
        </p>
      </div>

      <!-- Dropdown Filters -->
      <div class="filter-card">
    <div class="row g-4 align-items-end">

        <!-- Date Picker -->
        <div class="col-md-6">
            <label class="form-label fw-bold">Select Date</label>
            <input 
                type="date" 
                class="form-control custom-date"
                id="datePicker"
            >
        </div>

        <!-- Coil Dropdown -->
        <div class="col-md-6">
            <label class="form-label fw-bold">Select Coil ID</label>
            <select class="form-select" id="coilDropdown">
                <option selected>Select Coil ID</option>
            </select>
        </div>

        

    </div>
</div>

      <!-- Chart Section -->
     <!-- Line Chart Section -->
<div class="chart-card">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-title mb-0">
            <i class="bi bi-graph-up-arrow"></i> Line Chart
        </h4>

        <!-- Chart Type Dropdown -->
        <div style="width: 220px;">
            <select class="form-select" id="chartTypeDropdown">
                <option value="actual">Actual Thickness</option>
                <option value="deviation">Deviation</option>
            </select>
        </div>

        <button class="btn btn-primary px-4" id="drawChartBtn">
                <i class="bi bi-play-fill"></i> Draw Chart
            </button>
    </div>

    <!-- Chart Container -->
  <div class="chart-placeholder">
    <canvas id="lineChart"></canvas>
</div>

</div>

      <!-- Histogram Section -->
      <div class="chart-card">

    <!-- Header Row -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        
        <h4 class="section-title mb-0">
            <i class="bi bi-bar-chart-fill"></i> Histogram
        </h4>

        <div class="col-md-6">
            <label class="form-label fw-bold">Select Set-Point</label>
            <select class="form-select" id="setPointDropDown">
                <option selected>Select Set Point</option>
            </select>
        </div>

        <button class="btn btn-success px-4" 
         id="drawHistogramBtn">
            <i class="bi bi-play-fill"></i> Draw Histogram
        </button>

    </div>

    <!-- Deviation Modal -->
<div 
    id="modal" 
    style="
        display:none;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        margin-top: 20px;
    "
>
    <h5>Enter Deviation Range</h5>

    <input 
        type="number" 
        id="deviation" 
        class="form-control mb-3"
        placeholder="Enter deviation value"
    >

    <button class="btn btn-primary" onclick="applyDeviation()">
        Apply
    </button>
</div>

<div class="mt-3">
    <div id="inRangePct" class="fw-bold text-success"></div>
    <div id="outRangePct" class="fw-bold text-danger"></div>
    <p id="totalLength" class="fw-bold"></p>
</div>

    <!-- Histogram Area -->
    <div class="chart-placeholder">
    <canvas id="histogramchart"></canvas>
</div>

</div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src = "main-script.js"></script>
    <script src = "chart-script.js"></script>
    <script src = "histogram-script.js"></script>
  </body>
</html>
